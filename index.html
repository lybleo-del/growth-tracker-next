<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="个人成长陪伴工具 - 记录你的自我提升之旅">
    <title>成长助手 | 个人成长陪伴工具</title>

    <!-- 样式文件 -->
    <link rel="stylesheet" href="src/css/main.css">
    <link rel="stylesheet" href="src/css/neon-theme.css">

    <!-- 外部资源 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- 网站图标 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
</head>
<body>
    <!-- 启动界面 -->
    <div id="splashScreen" class="splash-screen hidden">
        <div class="splash-content">
            <div class="logo">
                <div class="glitch" data-text="成长助手">成长助手</div>
            </div>
            <div class="tagline">每一天，都是更好的自己</div>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <!-- 主应用容器 -->
    <div id="app" class="app-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-content">
                <div class="logo-small">
                    <span class="logo-icon">📈</span>
                    <span class="logo-text">成长助手</span>
                </div>
                <div class="user-info">
                    <div class="avatar">👤</div>
                </div>
            </div>
        </header>

        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 日期显示 -->
            <div class="date-section">
                <div class="current-date" id="currentDate"></div>
                <div class="weekday" id="weekday"></div>
            </div>

            <!-- 每日问候 -->
            <div class="greeting-section">
                <div class="greeting-text" id="greetingText">
                    <span class="wave">👋</span> 你好！新的一天，新的成长！
                </div>
            </div>

            <!-- 任务统计 -->
            <div class="stats-section">
                <div class="stat-card">
                    <div class="stat-label">今日任务</div>
                    <div class="stat-value" id="todayTasks">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">已完成</div>
                    <div class="stat-value completed" id="completedTasks">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">连续打卡</div>
                    <div class="stat-value streak" id="streakDays">0</div>
                </div>
            </div>

            <!-- 快捷打卡区域 -->
            <div class="quick-checkin">
                <h2 class="section-title">快速打卡</h2>
                <div class="task-grid" id="taskGrid">
                    <!-- 任务按钮将通过 JavaScript 动态添加 -->
                </div>
            </div>

            <!-- 每日记录 -->
            <div class="daily-notes">
                <h2 class="section-title">每日感悟</h2>
                <div class="notes-container">
                    <textarea id="dailyNotes" placeholder="今天有什么学习感悟或收获？"></textarea>
                    <div class="notes-actions">
                        <button class="btn-save" id="saveNotes">保存</button>
                    </div>
                </div>
            </div>

            <!-- 打卡历史 -->
            <div class="history-section">
                <h2 class="section-title">打卡历史</h2>
                <div class="history-container" id="historyContainer">
                    <!-- 历史记录将通过 JavaScript 动态添加 -->
                </div>
            </div>
        </main>

        <!-- 底部导航 -->
        <nav class="bottom-nav">
            <a href="#home" class="nav-item active" data-page="home">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">首页</span>
            </a>
            <a href="#stats" class="nav-item" data-page="stats">
                <span class="nav-icon">📊</span>
                <span class="nav-text">统计</span>
            </a>
            <a href="#tasks" class="nav-item" data-page="tasks">
                <span class="nav-icon">📝</span>
                <span class="nav-text">任务</span>
            </a>
            <a href="#profile" class="nav-item" data-page="profile">
                <span class="nav-icon">👤</span>
                <span class="nav-text">我的</span>
            </a>
        </nav>
    </div>

    <!-- 任务详情弹窗 -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">任务详情</h3>
                <button class="modal-close" id="closeModal">×</button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <div class="form-group">
                        <label for="taskType">任务类型</label>
                        <select id="taskType" required>
                            <option value="">请选择任务类型</option>
                            <option value="1">读书 📚</option>
                            <option value="2">Vibe Coding 💻</option>
                            <option value="3">健身 🏋️</option>
                            <option value="4">写自媒体 📱</option>
                            <option value="5">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskDuration">时长 (分钟)</label>
                        <input type="number" id="taskDuration" min="1" value="60" required>
                    </div>
                    <div class="form-group">
                        <label for="taskNotes">学习感受</label>
                        <textarea id="taskNotes" placeholder="记录你的学习感受..." rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="taskTags">标签</label>
                        <input type="text" id="taskTags" placeholder="用逗号分隔标签">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">完成打卡</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 统计页面 -->
    <div id="statsPage" class="page stats-page hidden">
        <div class="page-header">
            <button class="btn-back" id="backFromStats">← 返回</button>
            <h1>📊 统计分析</h1>
        </div>
        <div class="stats-content">
            <div class="chart-section">
                <div class="chart-title">任务完成趋势</div>
                <div class="chart-container">
                    <div class="placeholder-chart">
                        <div class="chart-placeholder">📈</div>
                        <div class="chart-text">任务完成趋势图</div>
                    </div>
                </div>
            </div>
            <div class="task-distribution">
                <div class="distribution-title">任务类型分布</div>
                <div class="distribution-grid" id="taskDistribution">
                    <!-- 任务分布将通过 JavaScript 动态添加 -->
                </div>
            </div>
            <div class="achievements-section">
                <h2>🏆 成就系统</h2>
                <div class="achievements-grid" id="achievementsGrid">
                    <!-- 成就将通过 JavaScript 动态添加 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 任务管理页面 -->
    <div id="tasksPage" class="page tasks-page hidden">
        <div class="page-header">
            <button class="btn-back" id="backFromTasks">← 返回</button>
            <h1>📝 任务管理</h1>
        </div>
        <div class="tasks-content">
            <div class="task-management">
                <div class="task-types">
                    <h2>任务类型</h2>
                    <div class="type-list" id="typeList">
                        <!-- 任务类型将通过 JavaScript 动态添加 -->
                    </div>
                </div>
                <div class="weekly-plan">
                    <h2>本周计划</h2>
                    <div class="plan-container" id="planContainer">
                        <div class="plan-placeholder">
                            <div class="placeholder-icon">📅</div>
                            <div class="placeholder-text">点击添加本周任务</div>
                            <button class="btn-add-plan" id="addPlan">添加任务</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 个人页面 -->
    <div id="profilePage" class="page profile-page hidden">
        <div class="page-header">
            <button class="btn-back" id="backFromProfile">← 返回</button>
            <h1>👤 个人中心</h1>
        </div>
        <div class="profile-content">
            <div class="profile-section">
                <h2>个人信息</h2>
                <div class="info-item">
                    <div class="info-label">用户名</div>
                    <div class="info-value">用户名</div>
                </div>
                <div class="info-item">
                    <div class="info-label">加入时间</div>
                    <div class="info-value" id="joinDate"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">总记录天数</div>
                    <div class="info-value" id="totalDays">0</div>
                </div>
            </div>
            <div class="settings-section">
                <h2>应用设置</h2>
                <div class="setting-item">
                    <div class="setting-label">数据备份</div>
                    <button class="btn-secondary">��出数据</button>
                </div>
                <div class="setting-item">
                    <div class="setting-label">关于应用</div>
                    <div class="setting-value">版本 1.0.0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 通知提示 -->
    <div id="notification" class="notification">
        <div class="notification-content">
            <div class="notification-icon"></div>
            <div class="notification-message"></div>
        </div>
    </div>

    <!-- JavaScript 文件 -->
    <script type="module" src="src/js/app.js"></script>
</body>
</html>
